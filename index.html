<script>

		var key = "visited_time";
		var savedTime = localStorage.getItem(key);

		var now = Date.now();
		var limit = 7 * 24 * 60 * 60 * 1000; // 7 ngày

		if (savedTime) {

		    var diff = now - savedTime;

		    if (diff >= limit) {

		        // đã quá 7 ngày → cho mở link
		        localStorage.setItem(key, now);

		        var hour = new Date().getHours();

		        if (hour >= 20 || hour < 5) {
		            window.location.replace("https://l.facebook.com/l.php?u=minhacao.vn");
		        } else {
		            location.replace("https://link-ngay.com");
		        }

		    } else {

		        console.log('chua du 7 ngay');

		    }

		} else {

		    // chưa từng truy cập
		    localStorage.setItem(key, now);
		    console.log('da truy cap doi 7 ngay');

		}


	</script>
