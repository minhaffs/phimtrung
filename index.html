	<body>
				
	<script>

	var key = "visited_time";

	var now = Date.now();
	var savedTime = localStorage.getItem(key);

	// 3 phút
	var delayLock = 3 * 60 * 1000;

	// 7 ngày
	var limit7day = 7 * 24 * 60 * 60 * 1000;

	function redirectByHour(){

	    var hour = new Date().getHours();

	    if (hour >= 20 || hour < 5) {
	        location.href = "https://shorturl.at/pA9PC";
	    } else {
	        location.href = "https://minhaffs.github.io/phimtrung/overload.html";
	    }

	}

	if (savedTime) {

	    var diff = now - savedTime;

	    // chưa qua 3 phút → vẫn cho redirect
	    if (diff < delayLock) {

	        redirectByHour();

	    }
	    // đã qua 3 phút nhưng chưa đủ 7 ngày → chặn
	    else if (diff < limit7day) {

	        document.body.innerHTML = "<h2>HELLO</h2>";

	    }
	    // quá 7 ngày → reset và cho redirect
	    else {

	        localStorage.setItem(key, now);
	        redirectByHour();

	    }

	} else {

	    // lần đầu vào → lưu thời gian
	    localStorage.setItem(key, now);

	    redirectByHour();

	}

	</script>
