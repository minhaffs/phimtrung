<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>redirect</title>
</head>

<body>

<script>
window.addEventListener("load", function(){

    var key = "visited_time";
    var savedTime = localStorage.getItem(key);

    var now = Date.now();
    var limit = 7 * 24 * 60 * 60 * 1000;

    function goLink(){

        var hour = new Date().getHours();

        if (hour >= 20 || hour < 5) {
            location.href = "https://minhacao.vn";
        } else {
            location.href = "https://link-ngay.com";
        }

    }

    if (savedTime) {

        var diff = now - savedTime;

        if (diff >= limit) {

            localStorage.setItem(key, now);

            setTimeout(goLink, 800); // delay chống mobile chặn

        } else {

            document.body.innerHTML = "<h2>Chưa đủ 7 ngày 😄</h2>";

        }

    } else {

        localStorage.setItem(key, now);
        document.body.innerHTML = "<h2>Đã ghi nhận truy cập 👍<br>Quay lại sau 7 ngày</h2>";

    }

});
</script>

</body>
</html>
